<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Комментарии (vanilla JS)</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 20px auto;
      }

      .comment {
        border-bottom: 1px solid #ccc;
        padding: 10px 0;
        margin-bottom: 10px;
      }

      .comment-author {
        font-weight: bold;
        color: #333;
      }

      .comment-date {
        font-size: 0.8em;
        color: #777;
        margin-left: 10px;
      }

      .comment-body {
        margin-top: 5px;
      }

      #form-container {
        margin-top: 20px;
      }

      input {
        padding: 5px;
        width: 70%;
      }

      button {
        padding: 5px 15px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h1>Комментарии к посту #1</h1>

    <div id="list">Загрузка...</div>

    <hr />

    <div id="form-container">
      <input id="body" placeholder="Написать комментарий..." />
      <button id="btn">Отправить</button>
    </div>

    <script src="/js/comments-demo.js"></script>
  </body>
</html>
